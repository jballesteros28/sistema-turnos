{% extends "base.html" %}

{% block title %}Ingresar | Sistema de turnos{% endblock %}

{% block content %}
<section class="auth-panel panel">
    <div class="page-header">
        <div>
            <p class="eyebrow">Acceso</p>
            <h1>Ingresar</h1>
        </div>
    </div>

    {% if form.errors %}
        <div class="notice">Usuario o contrasena invalidos.</div>
    {% endif %}

    <form method="post" class="form-grid">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <div class="field span-2">
            <label for="{{ form.username.id_for_label }}">Usuario</label>
            {{ form.username }}
        </div>
        <div class="field span-2">
            <label for="{{ form.password.id_for_label }}">Contrasena</label>
            {{ form.password }}
        </div>
        <div class="form-actions span-2">
            <button type="submit">Ingresar</button>
        </div>
    </form>
</section>
{% endblock %}
